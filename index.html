<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матюгальник 3000</title>
    <style>
        /* Оптимизированные анимации - меньше шагов, легче эффекты */
        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 0 0 15px red, 0 0 30px darkred;
                color: #ff0000;
            }
            50% { 
                text-shadow: 0 0 25px #ff00ff, 0 0 45px #00ffff;
                color: #ff00ff;
            }
        }
        
        @keyframes somersault {
            to { transform: translateX(-50%) rotate(360deg); }
        }
        
        @keyframes wordPulse {
            0%, 100% { 
                transform: scale(1);
                text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            }
            50% { 
                transform: scale(1.1);
                text-shadow: 0 0 30px #ff0000, 0 0 60px #ff00ff;
            }
        }
        
        @keyframes borderPulse {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000; }
            50% { border-color: #00ff00; box-shadow: 0 0 30px #00ff00; }
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0000, #1a0033, #2a0000, #002a2a);
            background-size: 200% 200%;
            font-family: 'Arial Black', 'Impact', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            /* Оптимизация производительности */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Заголовок - фиксированное позиционирование */
        .title-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            z-index: 9999;
            pointer-events: none;
        }
        
        .title {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            animation: titleGlow 2s infinite ease-in-out;
            font-family: 'Arial Black', 'Impact', sans-serif;
            -webkit-text-stroke: 2px black;
            background: rgba(0,0,0,0.3);
            padding: 15px 40px;
            border-radius: 60px;
            border: 4px solid gold;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            white-space: nowrap;
            transition: transform 0.2s ease;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            text-align: center;
            will-change: transform, box-shadow;
        }
        
        .title.somersault {
            animation: somersault 0.6s ease-in-out forwards;
        }
        
        .title:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px gold;
        }
        
        /* Контейнер для матерного слова */
        .swear-container {
            width: 90%;
            max-width: 1200px;
            margin: 150px 0 50px 0;
            padding: 30px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }
        
        /* Оптимизированная рамка */
        .swear-frame {
            background: rgba(0, 0, 0, 0.85);
            border: 8px solid red;
            border-radius: 60px 15px 60px 15px;
            padding: 50px 30px;
            position: relative;
            animation: borderPulse 3s infinite ease-in-out;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
            transform: rotate(0.5deg);
            transition: transform 0.2s ease;
            will-change: transform, border-color, box-shadow;
        }
        
        .swear-frame:hover {
            transform: rotate(-0.5deg) scale(1.01);
        }
        
        /* Уголки рамки */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid gold;
            z-index: 20;
        }
        
        .corner-tl {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
            border-radius: 25px 0 0 0;
        }
        
        .corner-tr {
            top: -5px;
            right: -5px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 25px 0 0;
        }
        
        .corner-bl {
            bottom: -5px;
            left: -5px;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 25px;
        }
        
        .corner-br {
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 25px 0;
        }
        
        /* Оптимизированное матерное слово */
        .swear-word {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-align: center;
            word-break: break-word;
            line-height: 1.2;
            cursor: pointer;
            animation: wordPulse 2s infinite ease-in-out;
            font-family: 'Arial Black', 'Impact', sans-serif;
            position: relative;
            z-index: 15;
            text-shadow: 0 0 20px cyan;
            transition: transform 0.1s ease;
            will-change: transform, text-shadow;
        }
        
        /* Оптимизированная кнопка */
        .new-swear-button {
            background: linear-gradient(135deg, #ff0000, #ff6600, #ff00ff);
            background-size: 200% 200%;
            border: none;
            color: white;
            padding: 25px 70px;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: bold;
            border-radius: 50px 15px 50px 15px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 4px dashed yellow;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            font-family: 'Arial Black', 'Impact', sans-serif;
            transform: rotate(-1deg);
            will-change: transform, box-shadow;
        }
        
        .new-swear-button:hover {
            transform: rotate(1deg) scale(1.1);
            box-shadow: 0 0 70px rgba(255, 0, 0, 0.8);
            border-style: solid;
        }
        
        .new-swear-button:active {
            transform: rotate(-2deg) scale(0.95);
            transition: transform 0.05s;
        }
        
        /* Статистика и счетчик */
        .stats, .counter {
            position: fixed;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Arial', sans-serif;
            z-index: 100;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            border: 2px solid gold;
            will-change: box-shadow;
        }
        
        .stats {
            left: 20px;
        }
        
        .counter {
            right: 20px;
            border-color: #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
        }
        
        .stats span, .counter span {
            font-weight: bold;
            font-size: 1.4rem;
            margin: 0 4px;
        }
        
        .stats span { color: gold; }
        .counter span { color: #ff00ff; }
        
        /* Подсказка */
        .hint {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            font-family: Arial, sans-serif;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            z-index: 50;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .title {
                font-size: clamp(1.2rem, 6vw, 2rem);
                padding: 8px 16px;
                white-space: normal;
                width: 90%;
            }
            
            .swear-container {
                margin: 120px 0 30px 0;
                padding: 15px;
            }
            
            .swear-frame {
                padding: 30px 15px;
            }
            
            .swear-word {
                font-size: clamp(2.5rem, 12vw, 5rem);
            }
            
            .new-swear-button {
                padding: 15px 30px;
                font-size: 1.4rem;
                width: 90%;
            }
            
            .stats, .counter {
                font-size: 0.9rem;
                padding: 8px 12px;
            }
            
            .stats span, .counter span {
                font-size: 1.1rem;
            }
            
            .hint {
                top: 85px;
                font-size: 0.75rem;
                white-space: normal;
                width: 90%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Контейнер для заголовка -->
    <div class="title-container">
        <div class="title" id="mainTitle" onclick="doSomersault()">
            🤬 МАТЮГАЛЬНИК 3000 🤬
        </div>
    </div>
    
    <!-- Подсказка -->
    <div class="hint">
        👆 Нажми на слово - скопируешь | Пробел - новый матюк
    </div>
    
    <!-- Контейнер с матерным словом -->
    <div class="swear-container">
        <div class="swear-frame" id="swearFrame">
            <!-- Золотые уголки -->
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>
            
            <!-- Само слово -->
            <div class="swear-word" id="swearWord">
                ХУЙ
            </div>
        </div>
    </div>
    
    <!-- Кнопка для нового слова -->
    <div class="button-container">
        <button class="new-swear-button" id="newSwearButton">
            🔞 НОВЫЙ МАТЮК 🔞
        </button>
    </div>
    
    <!-- Статистика -->
    <div class="stats">
        📊 В арсенале: <span id="wordCount">69</span> матюков
    </div>
    
    <!-- Счетчик кликов -->
    <div class="counter">
        🔥 Использовано: <span id="clickCount">0</span> раз
    </div>

    <script>
        (function() {
            // Оптимизированный массив слов (оставил как есть)
            const swearWords = [
                "ХУЙ", "ПИЗДА", "ЕБЛАН", "ГАНДОН", "МУДАК", "УЕБАН", 
                "ДОЛБОЁБ", "ЗАЛУПА", "МАНДА", "ШЛЮХА", "БЛЯДЬ", 
                "ПИДОР", "РАК", "ЧМО", "ЛОХ", "СОПЛЯ", "ГАВНО",
                "ХУЕСОС", "ПИЗДОБОЛ", "ЕБАНЬКО", "ЗАПИЗДЕНЬ", 
                "МУДОЁБ", "УЁБИЩЕ", "ДОЛБОПИЗД", "ХУЕМОРДА",
                "ПИЗДЮК", "ГАНДОНИНА", "ШМАРА", "КОЗЁЛ",
                "НИЩЕБРОД", "ЧЕРТ", "ВЫБЛЫДОК", "УРОД", "ДЕБИЛ",
                "ИДИОТ", "КРЕТИН", "СКОТИНА", "СВОЛОЧЬ", "ТВАРЬ",
                "МРАЗЬ", "ГАД", "ПАДАЛЬ", "ГНИДА", "ЗМЕЯ",
                "ХУЙЛО", "ПИЗДОСТРАДАЛЕЦ", "МАНДАВОШКА", "ЗАЛУПИНСК",
                "ГОВНОМЕС", "ХУЕВАТИНА", "ПИЗДОПРОЁБЩИК", "ДРОЧИЛА",
                "ОНАНИСТ", "РУКОБЛУД", "СКВЕРНОСЛОВ", "МАТЕМАТИК",
                "ЕБАНИНА", "ХУЕТА", "ПИЗДЕЦ", "ЗАПИЗДЯЙ", "ПЕРЕПИЗДЫШ",
                "НЕДОНОСОК", "ВЫСЕРЫШ", "ОТБРОС", "ПОДОНОК",
                "ХУЁВЫЙ", "ПИЗДАТЫЙ", "ЗАПИЗДЕННЫЙ", "ОБОСРАННЫЙ",
                "НАХУЯРИЛ", "ОБЪЕБАЛ", "ЗАЛУПИЛСЯ", "РАСПИЗДЯЙНИЧАЛ",
                "ХУЯКНУТЬ", "ПИЗДАНУТЬ", "ЗАХУЯРИТЬ", "НАПИЗДЕТЬ",
                "СПИЗДИТЬ", "УЁБЫВАТЬ", "ЗАЕБАТЬ", "ДОЕБАТЬСЯ",
                "ПИЗДОГЛАЗЫЙ", "ХУЕГУБЫЙ", "МУДОЁБИНА", "ГАНДОНЧИК",
                "ПЁС", "ПСИНА", "КОБЕЛЬ", "БАРАН", "ОСЁЛ",
                "ХУЙНЯ", "ПИЗДЮЛИНА", "ЗАЛУПА ПОДЗАЛУПНАЯ",
                "ОПУЩЕНЕЦ", "ЧЕПУШИЛА", "МАЛАХОЛЬНЫЙ", "ПРОТУБЕРАНЕЦ",
                "ЭКСКРЕМЕНТ", "ФЕКАЛИЙ", "СРАНЬ", "ГОВЕНЦО",
                "МОЧЕВЫПУСКАТЕЛЬ", "СПЕРМОТОКСИКОЗ", "АНОНИМУС",
                "ПСИХОНАВТ", "ШИЗОИД", "ПАРАНОИК", "ШИЗОФРЕНИК",
                "ДУРАК", "БАЛБЕС", "ОБАЛДУЙ", "БЕЗМОЗГЛЫЙ",
                "КУРИЦА", "ПЕТУХ", "ИНДЮК", "ГУСЬ", "УТКА",
                "БАБА", "БАБИЩА", "СТЕРВА", "МЕГЕРА", "ВЕДЬМА",
                "ЧЁРТ", "ДЕМОН", "БЕС", "САТАНА", "ЛЮЦИФЕР",
                "ПЬЯНЬ", "АЛКАШ", "СИНЮХА", "ПЬЯНЧУГА", "ЗЕЛЁНЫЙ ЗМИЙ"
            ];
            
            // Кэшируем DOM элементы
            const titleEl = document.getElementById('mainTitle');
            const swearEl = document.getElementById('swearWord');
            const frameEl = document.getElementById('swearFrame');
            const buttonEl = document.getElementById('newSwearButton');
            const clickCountEl = document.getElementById('clickCount');
            
            // Состояние
            let currentIndex = Math.floor(Math.random() * swearWords.length);
            let clickCount = 0;
            
            // Инициализация
            swearEl.textContent = swearWords[currentIndex];
            document.getElementById('wordCount').textContent = swearWords.length;
            
            // Оптимизированная функция получения случайного индекса
            function getRandomIndex() {
                if (swearWords.length === 1) return 0;
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * swearWords.length);
                } while (newIndex === currentIndex);
                return newIndex;
            }
            
            // Оптимизированное обновление слова
            function updateSwearWord() {
                currentIndex = getRandomIndex();
                swearEl.textContent = swearWords[currentIndex];
                
                // Обновляем счетчик
                clickCountEl.textContent = ++clickCount;
                
                // Легкая анимация через классы вместо прямых манипуляций стилями
                swearEl.style.transform = 'scale(1.1)';
                frameEl.style.transform = 'rotate(1deg) scale(1.02)';
                
                // Сбрасываем через requestAnimationFrame для плавности
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        swearEl.style.transform = '';
                        frameEl.style.transform = '';
                    }, 100);
                });
            }
            
            // Оптимизированная функция сальто
            function doSomersault() {
                titleEl.classList.add('somersault');
                titleEl.style.transform = 'scale(1.2)';
                
                setTimeout(() => {
                    titleEl.classList.remove('somersault');
                    titleEl.style.transform = '';
                }, 600);
            }
            
            // Оптимизированное копирование
            function copySwearWord() {
                const word = swearEl.textContent;
                
                navigator.clipboard.writeText(word).then(() => {
                    // Легкая анимация через transform
                    swearEl.style.transform = 'scale(1.2)';
                    
                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            swearEl.style.transform = '';
                        }, 150);
                    });
                    
                    // Показываем уведомление
                    showNotification(word);
                }).catch(() => {
                    alert('Не удалось скопировать: ' + word);
                });
            }
            
            // Оптимизированное уведомление
            function showNotification(word) {
                const notif = document.createElement('div');
                notif.textContent = `"${word}" скопировано! 🤘`;
                notif.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: linear-gradient(45deg, red, purple);
                    color: white;
                    padding: 15px 30px;
                    border-radius: 40px;
                    font-family: Arial Black, sans-serif;
                    font-size: clamp(1rem, 5vw, 2rem);
                    z-index: 20000;
                    border: 4px solid gold;
                    box-shadow: 0 0 100px gold;
                    opacity: 0;
                    transition: opacity 0.2s, transform 0.3s;
                    pointer-events: none;
                `;
                
                document.body.appendChild(notif);
                
                // Используем requestAnimationFrame для плавного появления
                requestAnimationFrame(() => {
                    notif.style.opacity = '1';
                    notif.style.transform = 'translate(-50%, -50%) scale(1.1)';
                    
                    setTimeout(() => {
                        notif.style.opacity = '0';
                        notif.style.transform = 'translate(-50%, -50%) scale(0.8)';
                        setTimeout(() => {
                            document.body.removeChild(notif);
                        }, 200);
                    }, 800);
                });
            }
            
            // Обработчики событий
            buttonEl.addEventListener('click', updateSwearWord);
            swearEl.addEventListener('click', copySwearWord);
            titleEl.addEventListener('click', doSomersault);
            
            // Обработка пробела
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !e.repeat && 
                    !e.target.matches('button, input, textarea')) {
                    e.preventDefault();
                    updateSwearWord();
                    
                    // Анимация кнопки
                    buttonEl.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        buttonEl.style.transform = '';
                    }, 100);
                }
            });
            
            // Оптимизированные эффекты наведения
            frameEl.addEventListener('mouseenter', () => {
                frameEl.style.transform = 'rotate(-0.5deg) scale(1.02)';
            });
            
            frameEl.addEventListener('mouseleave', () => {
                frameEl.style.transform = '';
            });
            
            // Отключаем контекстное меню на слове
            swearEl.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                copySwearWord();
            });
        })();
    </script>
</body>
</html>
