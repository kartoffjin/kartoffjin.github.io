<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матюгальник 3000</title>
    <style>
        /* Оптимизированные анимации */
        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 0 0 15px red, 0 0 30px darkred;
                color: #ff0000;
            }
            50% { 
                text-shadow: 0 0 25px #ff00ff, 0 0 45px #00ffff;
                color: #ff00ff;
            }
        }
        
        @keyframes sideSomersault {
            0% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(100px) rotate(90deg) scale(1.2); }
            50% { transform: translateX(-100px) rotate(180deg) scale(0.8); }
            75% { transform: translateX(50px) rotate(270deg) scale(1.1); }
            100% { transform: translateX(0) rotate(360deg); }
        }
        
        @keyframes wordPulse {
            0%, 100% { 
                transform: scale(1);
                text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
            }
            50% { 
                transform: scale(1.1);
                text-shadow: 0 0 30px #ff0000, 0 0 60px #ff00ff;
            }
        }
        
        @keyframes borderPulse {
            0%, 100% { border-color: #ff0000; box-shadow: 0 0 30px #ff0000, inset 0 0 15px #ff0000; }
            50% { border-color: #00ff00; box-shadow: 0 0 30px #00ff00, inset 0 0 15px #00ff00; }
        }
        
        @keyframes prizeGlow {
            0%, 100% { 
                box-shadow: 0 0 15px gold, 0 0 30px orange;
                border-color: gold;
            }
            50% { 
                box-shadow: 0 0 25px #ffd700, 0 0 45px #ffa500;
                border-color: #ffa500;
            }
        }
        
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0000, #1a0033, #2a0000, #002a2a);
            background-size: 200% 200%;
            font-family: 'Arial Black', 'Impact', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Заголовок - фиксированное позиционирование */
        .title-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
            z-index: 9999;
            pointer-events: none;
        }
        
        .title {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            animation: titleGlow 2s infinite ease-in-out;
            font-family: 'Arial Black', 'Impact', sans-serif;
            -webkit-text-stroke: 2px black;
            background: rgba(0,0,0,0.3);
            padding: 15px 40px;
            border-radius: 60px;
            border: 4px solid gold;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            white-space: nowrap;
            transition: transform 0.2s ease;
            pointer-events: auto;
            backdrop-filter: blur(5px);
            text-align: center;
            will-change: transform;
        }
        
        .title.side-somersault {
            animation: sideSomersault 0.8s ease-in-out forwards;
        }
        
        .title:hover {
            transform: scale(1.05);
            box-shadow: 0 0 70px gold;
        }
        
        /* Основной контент */
        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 120px;
            margin-bottom: 30px;
        }
        
        /* Контейнер для матерного слова */
        .swear-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 0 30px 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 10;
        }
        
        /* Рамка для матюков */
        .swear-frame {
            background: rgba(0, 0, 0, 0.85);
            border: 8px solid red;
            border-radius: 60px 15px 60px 15px;
            padding: 50px 30px;
            position: relative;
            animation: borderPulse 3s infinite ease-in-out;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.3);
            transform: rotate(0.5deg);
            transition: transform 0.2s ease;
            will-change: transform;
        }
        
        .swear-frame:hover {
            transform: rotate(-0.5deg) scale(1.01);
        }
        
        /* Уголки рамки */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 4px solid gold;
            z-index: 20;
        }
        
        .corner-tl {
            top: -5px;
            left: -5px;
            border-right: none;
            border-bottom: none;
            border-radius: 25px 0 0 0;
        }
        
        .corner-tr {
            top: -5px;
            right: -5px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 25px 0 0;
        }
        
        .corner-bl {
            bottom: -5px;
            left: -5px;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 25px;
        }
        
        .corner-br {
            bottom: -5px;
            right: -5px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 25px 0;
        }
        
        /* Матерное слово */
        .swear-word {
            font-size: clamp(4rem, 15vw, 12rem);
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            text-align: center;
            word-break: break-word;
            line-height: 1.2;
            cursor: pointer;
            animation: wordPulse 2s infinite ease-in-out;
            font-family: 'Arial Black', 'Impact', sans-serif;
            position: relative;
            z-index: 15;
            text-shadow: 0 0 20px cyan;
            transition: transform 0.1s ease;
            will-change: transform;
        }
        
        /* Кнопка */
        .button-container {
            text-align: center;
            margin: 20px 0 40px 0;
            position: relative;
            z-index: 10;
        }
        
        .new-swear-button {
            background: linear-gradient(135deg, #ff0000, #ff6600, #ff00ff);
            background-size: 200% 200%;
            border: none;
            color: white;
            padding: 25px 70px;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: bold;
            border-radius: 50px 15px 50px 15px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 4px dashed yellow;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.5);
            font-family: 'Arial Black', 'Impact', sans-serif;
            transform: rotate(-1deg);
            will-change: transform;
        }
        
        .new-swear-button:hover {
            transform: rotate(1deg) scale(1.1);
            box-shadow: 0 0 70px rgba(255, 0, 0, 0.8);
            border-style: solid;
        }
        
        .new-swear-button:active {
            transform: rotate(-2deg) scale(0.95);
            transition: transform 0.05s;
        }
        
        /* Вкладки */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
            position: relative;
            z-index: 15;
            width: 100%;
        }
        
        .tab {
            padding: 15px 40px;
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: bold;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: 3px solid gold;
            border-radius: 40px 10px 40px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Arial Black', sans-serif;
        }
        
        .tab:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px gold;
            border-color: white;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #ffd700, #ffa500);
            color: black;
            border-color: white;
            box-shadow: 0 0 60px gold;
            transform: scale(1.02);
        }
        
        /* Зал славы */
        .hall-of-fame {
            width: 95%;
            max-width: 1400px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border: 4px solid gold;
            border-radius: 40px 10px 40px 10px;
            padding: 30px 20px;
            margin: 20px auto;
            box-shadow: 0 0 100px rgba(255, 215, 0, 0.3);
            display: none;
            position: relative;
            z-index: 20;
            box-sizing: border-box;
        }
        
        .hall-of-fame.active {
            display: block;
        }
        
        .hall-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: gold;
            text-align: center;
            margin: 0 0 30px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 30px gold;
            -webkit-text-stroke: 1px darkgoldenrod;
        }
        
        .prizes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 10px;
        }
        
        .prize-item {
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border: 3px solid gold;
            border-radius: 20px 5px 20px 5px;
            padding: 20px 10px;
            text-align: center;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            animation: prizeGlow 2s infinite ease-in-out;
            transition: transform 0.2s ease;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 1px;
            word-break: break-word;
            will-change: transform;
        }
        
        .prize-item:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 0 40px gold;
            border-color: white;
        }
        
        .prize-item:active {
            transform: scale(0.95);
        }
        
        .empty-hall {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 2rem;
            padding: 50px;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        /* Статистика и счетчик */
        .stats, .counter {
            position: fixed;
            bottom: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-family: 'Arial', sans-serif;
            z-index: 100;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            border: 2px solid gold;
            will-change: box-shadow;
        }
        
        .stats {
            left: 20px;
        }
        
        .counter {
            right: 20px;
            border-color: #ff00ff;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
        }
        
        .stats span, .counter span {
            font-weight: bold;
            font-size: 1.4rem;
            margin: 0 4px;
        }
        
        .stats span { color: gold; }
        .counter span { color: #ff00ff; }
        
        /* Мобильная адаптация */
        @media (max-width: 768px) {
            .title {
                font-size: clamp(1.2rem, 6vw, 2rem);
                padding: 8px 16px;
                white-space: normal;
                width: 90%;
            }
            
            .main-content {
                margin-top: 100px;
            }
            
            .swear-container {
                padding: 10px;
            }
            
            .swear-frame {
                padding: 30px 15px;
            }
            
            .swear-word {
                font-size: clamp(2.5rem, 12vw, 5rem);
            }
            
            .new-swear-button {
                padding: 15px 30px;
                font-size: 1.4rem;
                width: 90%;
            }
            
            .tabs {
                gap: 10px;
                padding: 0 10px;
            }
            
            .tab {
                padding: 10px 20px;
                font-size: 1rem;
            }
            
            .hall-of-fame {
                padding: 20px 10px;
            }
            
            .prizes-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px;
            }
            
            .prize-item {
                padding: 15px 5px;
                font-size: 1rem;
            }
            
            .stats, .counter {
                font-size: 0.9rem;
                padding: 8px 12px;
            }
            
            .stats span, .counter span {
                font-size: 1.1rem;
            }
        }
        
        /* Для очень маленьких экранов */
        @media (max-width: 480px) {
            .title-container {
                padding: 10px;
            }
            
            .stats {
                left: 10px;
                bottom: 10px;
            }
            
            .counter {
                right: 10px;
                bottom: 10px;
            }
            
            .prizes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Заголовок -->
    <div class="title-container">
        <div class="title" id="mainTitle">
            🤬 МАТЮГАЛЬНИК 3000 🤬
        </div>
    </div>
    
    <!-- Основной контент -->
    <div class="main-content">
        <!-- Контейнер с матерным словом -->
        <div class="swear-container">
            <div class="swear-frame" id="swearFrame">
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>
                <div class="swear-word" id="swearWord">ХУЙ</div>
            </div>
        </div>
        
        <!-- Кнопка для нового слова -->
        <div class="button-container">
            <button class="new-swear-button" id="newSwearButton">
                🔞 НОВЫЙ МАТЮК 🔞
            </button>
        </div>
        
        <!-- Вкладки -->
        <div class="tabs">
            <div class="tab active" id="mainTab">ГЛАВНАЯ</div>
            <div class="tab" id="hallOfFameTab">🏆 ЗАЛ СЛАВЫ 🏆</div>
        </div>
        
        <!-- Зал славы -->
        <div class="hall-of-fame" id="hallOfFame">
            <div class="hall-title">⚜️ ПОЧЁТНЫЕ МАТЮКИ ⚜️</div>
            <div class="prizes-grid" id="prizesGrid"></div>
        </div>
    </div>
    
    <!-- Статистика -->
    <div class="stats">
        📊 В арсенале: <span id="wordCount">69</span> матюков
    </div>
    
    <!-- Счетчик кликов -->
    <div class="counter">
        🔥 Использовано: <span id="clickCount">0</span> раз
    </div>

    <script>
        (function() {
            // Массив матерных слов
            const swearWords = [
                "ХУЙ", "ПИЗДА", "ЕБЛАН", "ГАНДОН", "МУДАК", "УЕБАН", 
                "ДОЛБОЁБ", "ЗАЛУПА", "МАНДА", "ШЛЮХА", "БЛЯДЬ", 
                "ПИДОР", "РАК", "ЧМО", "ЛОХ", "СОПЛЯ", "ГАВНО",
                "ХУЕСОС", "ПИЗДОБОЛ", "ЕБАНЬКО", "ЗАПИЗДЕНЬ", 
                "МУДОЁБ", "УЁБИЩЕ", "ДОЛБОПИЗД", "ХУЕМОРДА",
                "ПИЗДЮК", "ГАНДОНИНА", "ШМАРА", "КОЗЁЛ",
                "НИЩЕБРОД", "ЧЕРТ", "ВЫБЛЫДОК", "УРОД", "ДЕБИЛ",
                "ИДИОТ", "КРЕТИН", "СКОТИНА", "СВОЛОЧЬ", "ТВАРЬ",
                "МРАЗЬ", "ГАД", "ПАДАЛЬ", "ГНИДА", "ЗМЕЯ",
                "ХУЙЛО", "ПИЗДОСТРАДАЛЕЦ", "МАНДАВОШКА", "ЗАЛУПИНСК",
                "ГОВНОМЕС", "ХУЕВАТИНА", "ПИЗДОПРОЁБЩИК", "ДРОЧИЛА",
                "ОНАНИСТ", "РУКОБЛУД", "СКВЕРНОСЛОВ", "МАТЕМАТИК",
                "ЕБАНИНА", "ХУЕТА", "ПИЗДЕЦ", "ЗАПИЗДЯЙ", "ПЕРЕПИЗДЫШ",
                "НЕДОНОСОК", "ВЫСЕРЫШ", "ОТБРОС", "ПОДОНОК",
                "ХУЁВЫЙ", "ПИЗДАТЫЙ", "ЗАПИЗДЕННЫЙ", "ОБОСРАННЫЙ",
                "НАХУЯРИЛ", "ОБЪЕБАЛ", "ЗАЛУПИЛСЯ", "РАСПИЗДЯЙНИЧАЛ",
                "ХУЯКНУТЬ", "ПИЗДАНУТЬ", "ЗАХУЯРИТЬ", "НАПИЗДЕТЬ",
                "СПИЗДИТЬ", "УЁБЫВАТЬ", "ЗАЕБАТЬ", "ДОЕБАТЬСЯ",
                "ПИЗДОГЛАЗЫЙ", "ХУЕГУБЫЙ", "МУДОЁБИНА", "ГАНДОНЧИК",
                "ПЁС", "ПСИНА", "КОБЕЛЬ", "БАРАН", "ОСЁЛ",
                "ХУЙНЯ", "ПИЗДЮЛИНА", "ЗАЛУПА ПОДЗАЛУПНАЯ",
                "ОПУЩЕНЕЦ", "ЧЕПУШИЛА", "МАЛАХОЛЬНЫЙ", "ПРОТУБЕРАНЕЦ",
                "ЭКСКРЕМЕНТ", "ФЕКАЛИЙ", "СРАНЬ", "ГОВЕНЦО",
                "МОЧЕВЫПУСКАТЕЛЬ", "СПЕРМОТОКСИКОЗ", "АНОНИМУС",
                "ПСИХОНАВТ", "ШИЗОИД", "ПАРАНОИК", "ШИЗОФРЕНИК",
                "ДУРАК", "БАЛБЕС", "ОБАЛДУЙ", "БЕЗМОЗГЛЫЙ",
                "КУРИЦА", "ПЕТУХ", "ИНДЮК", "ГУСЬ", "УТКА",
                "БАБА", "БАБИЩА", "СТЕРВА", "МЕГЕРА", "ВЕДЬМА",
                "ЧЁРТ", "ДЕМОН", "БЕС", "САТАНА", "ЛЮЦИФЕР",
                "ПЬЯНЬ", "АЛКАШ", "СИНЮХА", "ПЬЯНЧУГА", "ЗЕЛЁНЫЙ ЗМИЙ"
            ];
            
            // Кэшируем DOM элементы
            const titleEl = document.getElementById('mainTitle');
            const swearEl = document.getElementById('swearWord');
            const frameEl = document.getElementById('swearFrame');
            const buttonEl = document.getElementById('newSwearButton');
            const clickCountEl = document.getElementById('clickCount');
            const mainTabEl = document.getElementById('mainTab');
            const hallTabEl = document.getElementById('hallOfFameTab');
            const hallOfFameEl = document.getElementById('hallOfFame');
            const prizesGridEl = document.getElementById('prizesGrid');
            
            // Состояние
            let currentIndex = Math.floor(Math.random() * swearWords.length);
            let clickCount = 0;
            const revealedWords = new Set(); // Множество для хранения показанных слов
            
            // Инициализация
            swearEl.textContent = swearWords[currentIndex];
            revealedWords.add(swearWords[currentIndex]); // Добавляем первое слово
            document.getElementById('wordCount').textContent = swearWords.length;
            updatePrizesGrid(); // Заполняем зал славы
            
            // Оптимизированная функция получения случайного индекса
            function getRandomIndex() {
                if (swearWords.length === 1) return 0;
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * swearWords.length);
                } while (newIndex === currentIndex);
                return newIndex;
            }
            
            // Обновление сетки призов
            function updatePrizesGrid() {
                const revealedArray = Array.from(revealedWords);
                
                if (revealedArray.length === 0) {
                    prizesGridEl.innerHTML = '<div class="empty-hall">🏆 ПОКА НИЧЕГО НЕТ 🏆</div>';
                    return;
                }
                
                // Создаем элементы призов
                let html = '';
                revealedArray.forEach(word => {
                    html += `<div class="prize-item" onclick="copyPrize('${word}')">${word}</div>`;
                });
                
                prizesGridEl.innerHTML = html;
            }
            
            // Функция для копирования из зала славы (глобальная для onclick)
            window.copyPrize = function(word) {
                navigator.clipboard.writeText(word).then(() => {
                    showNotification(word, true);
                }).catch(() => {
                    alert('Не удалось скопировать: ' + word);
                });
            };
            
            // Обновление слова
            function updateSwearWord() {
                currentIndex = getRandomIndex();
                const newWord = swearWords[currentIndex];
                swearEl.textContent = newWord;
                
                // Добавляем слово в зал славы, если его там еще нет
                if (!revealedWords.has(newWord)) {
                    revealedWords.add(newWord);
                    updatePrizesGrid();
                }
                
                // Обновляем счетчик
                clickCountEl.textContent = ++clickCount;
                
                // Анимация
                swearEl.style.transform = 'scale(1.1)';
                frameEl.style.transform = 'rotate(1deg) scale(1.02)';
                
                requestAnimationFrame(() => {
                    setTimeout(() => {
                        swearEl.style.transform = '';
                        frameEl.style.transform = '';
                    }, 100);
                });
            }
            
            // Функция сальто в сторону
            function doSideSomersault() {
                titleEl.classList.add('side-somersault');
                
                setTimeout(() => {
                    titleEl.classList.remove('side-somersault');
                }, 800);
            }
            
            // Функция копирования
            function copySwearWord() {
                const word = swearEl.textContent;
                
                navigator.clipboard.writeText(word).then(() => {
                    swearEl.style.transform = 'scale(1.2)';
                    
                    requestAnimationFrame(() => {
                        setTimeout(() => {
                            swearEl.style.transform = '';
                        }, 150);
                    });
                    
                    showNotification(word);
                }).catch(() => {
                    alert('Не удалось скопировать: ' + word);
                });
            }
            
            // Уведомление
            function showNotification(word, isFromHall = false) {
                const notif = document.createElement('div');
                notif.textContent = isFromHall ? `"${word}" из Зала Славы! 🤘` : `"${word}" скопировано! 🤘`;
                notif.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: linear-gradient(45deg, red, purple);
                    color: white;
                    padding: 15px 30px;
                    border-radius: 40px;
                    font-family: Arial Black, sans-serif;
                    font-size: clamp(1rem, 5vw, 2rem);
                    z-index: 20000;
                    border: 4px solid gold;
                    box-shadow: 0 0 100px gold;
                    opacity: 0;
                    transition: opacity 0.2s, transform 0.3s;
                    pointer-events: none;
                `;
                
                document.body.appendChild(notif);
                
                requestAnimationFrame(() => {
                    notif.style.opacity = '1';
                    notif.style.transform = 'translate(-50%, -50%) scale(1.1)';
                    
                    setTimeout(() => {
                        notif.style.opacity = '0';
                        notif.style.transform = 'translate(-50%, -50%) scale(0.8)';
                        setTimeout(() => {
                            document.body.removeChild(notif);
                        }, 200);
                    }, 800);
                });
            }
            
            // Переключение вкладок
            function switchTab(tab) {
                if (tab === 'main') {
                    mainTabEl.classList.add('active');
                    hallTabEl.classList.remove('active');
                    hallOfFameEl.classList.remove('active');
                } else {
                    mainTabEl.classList.remove('active');
                    hallTabEl.classList.add('active');
                    hallOfFameEl.classList.add('active');
                }
            }
            
            // Обработчики событий
            titleEl.addEventListener('click', doSideSomersault);
            buttonEl.addEventListener('click', updateSwearWord);
            swearEl.addEventListener('click', copySwearWord);
            mainTabEl.addEventListener('click', () => switchTab('main'));
            hallTabEl.addEventListener('click', () => switchTab('hall'));
            
            // Обработка пробела
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && !e.repeat && 
                    !e.target.matches('button, input, textarea, .prize-item')) {
                    e.preventDefault();
                    updateSwearWord();
                    
                    buttonEl.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        buttonEl.style.transform = '';
                    }, 100);
                }
            });
            
            // Эффекты наведения на рамку
            frameEl.addEventListener('mouseenter', () => {
                frameEl.style.transform = 'rotate(-0.5deg) scale(1.02)';
            });
            
            frameEl.addEventListener('mouseleave', () => {
                frameEl.style.transform = '';
            });
            
            // Отключаем контекстное меню на слове
            swearEl.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                copySwearWord();
            });
        })();
    </script>
</body>
</html>
